"$schema" = 'https://starship.rs/config-schema.json'

palette = "catppuccin_mocha"

add_newline = false

format = """$directory$character"""
right_format = """$all"""

[os]
disabled = false
format = "[$symbol](#blue) "

[os.symbols]
Arch   = "󰣇"

[directory]
format            = "[$path](teal) "
truncation_length = 4
truncate_to_repo  = true

[git_branch]
symbol = ""
format = "[$symbol $branch](bold mauve) "

[git_status]
format     = "($ahead_behind$staged$modified$untracked$deleted$conflicted)"
ahead      = "[⇡$count ](bold teal)"
behind     = "[⇣$count ](bold teal)"
diverged   = "[⇡$ahead_count⇣$behind_count ](bold teal)"
staged     = "[+$count ](bold green)"
modified   = "[●$count ](bold yellow)"
untracked  = "[?$count ](bold rosewater)"
deleted    = "[✘$count ](bold red)"
conflicted = "[⚡$count ](bold red)"

[nodejs]
symbol = ""
format = "[$symbol $version](green) "

[rust]
symbol = ""
format = "[$symbol $version](red) "

[golang]
symbol = ""
format = "[$symbol $version](teal) "

[php]
symbol = ""
format = "[$symbol $version](mauve) "

[character]
success_symbol = "[❯](green)"
error_symbol   = "[❯](red)"
vimcmd_symbol  = "[❮](blue)"


